<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="960" height="620" fill="#ffffff"/>

  <!-- app window -->
  <rect x="20" y="20" width="920" height="468" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== top bar ===== -->
  <rect x="20" y="20" width="920" height="56" rx="16" fill="#f8fafc"/>
  <rect x="20" y="60" width="920" height="16" fill="#f8fafc"/>
  <line x1="20" y1="76" x2="940" y2="76" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- logo -->
  <circle cx="50" cy="48" r="12" fill="#ffffff" stroke="#A40194" stroke-width="3"/>
  <text x="74" y="44" font-size="13" font-weight="700" fill="#0f172a">TRIC-seq Explorer</text>
  <text x="74" y="59" font-size="10.5" fill="#94a3b8">one RNA · every lens</text>
  <!-- search box -->
  <rect x="335" y="32" width="300" height="32" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="356" cy="48" r="6" fill="none" stroke="#94a3b8" stroke-width="2"/>
  <line x1="360" y1="52" x2="365" y2="57" stroke="#94a3b8" stroke-width="2"/>
  <text x="374" y="52" font-size="12.5" fill="#94a3b8">Search any RNA…</text>
  <rect x="598" y="40" width="28" height="16" rx="4" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="612" y="52" font-size="10" fill="#64748b" text-anchor="middle">⌘K</text>
  <!-- filters / dataset / guide -->
  <rect x="690" y="32" width="32" height="32" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
  <g stroke="#475569" stroke-width="2" stroke-linecap="round">
    <line x1="699" y1="43" x2="713" y2="43"/><circle cx="708" cy="43" r="2.4" fill="#fff"/>
    <line x1="699" y1="53" x2="713" y2="53"/><circle cx="703" cy="53" r="2.4" fill="#fff"/>
  </g>
  <rect x="730" y="32" width="118" height="32" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="742" y="42" width="13" height="13" rx="2.5" fill="none" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="762" y="52" font-size="12" fill="#334155" font-style="italic">E. coli</text>
  <text x="836" y="52" font-size="11" fill="#94a3b8">▾</text>
  <rect x="856" y="32" width="32" height="32" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
  <rect x="864" y="40" width="16" height="16" rx="2" fill="none" stroke="#475569" stroke-width="1.6"/>
  <line x1="872" y1="40" x2="872" y2="56" stroke="#475569" stroke-width="1.6"/>

  <!-- ===== lens tabs ===== -->
  <g font-size="12.5" font-weight="600">
    <rect x="40" y="92" width="150" height="40" rx="13" fill="#0f172a"/>
    <text x="64" y="110" fill="#ffffff">Interactome</text>
    <text x="64" y="125" font-size="10" font-weight="400" fill="#cbd5e1">Genome-wide partners</text>

    <rect x="200" y="92" width="120" height="40" rx="13" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="222" y="110" fill="#475569">Pair</text>
    <text x="222" y="125" font-size="10" font-weight="400" fill="#94a3b8">Contact map</text>

    <rect x="330" y="92" width="130" height="40" rx="13" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="352" y="110" fill="#475569">Structure</text>
    <text x="352" y="125" font-size="10" font-weight="400" fill="#94a3b8">Fold</text>

    <rect x="470" y="92" width="135" height="40" rx="13" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="492" y="110" fill="#475569">Compare</text>
    <text x="492" y="125" font-size="10" font-weight="400" fill="#94a3b8">Side-by-side</text>
    <circle cx="590" cy="105" r="9" fill="#0f172a"/>
    <text x="590" y="109" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  </g>

  <!-- ===== main lens canvas (mini circos) ===== -->
  <rect x="40" y="146" width="560" height="326" rx="14" fill="#ffffff" stroke="#eef2f7" stroke-width="1.5"/>
  <g transform="translate(320,309)">
    <circle r="120" fill="none" stroke="#cbd5e1" stroke-width="6"/>
    <!-- chords -->
    <g fill="none" stroke-linecap="round">
      <path d="M0,-120 Q0,0 110,-48" stroke="#312e81" stroke-width="3"/>
      <path d="M0,-120 Q0,0 118,30" stroke="#3730a3" stroke-width="2.2"/>
      <path d="M0,-120 Q0,0 60,104" stroke="#4338ca" stroke-width="3.4"/>
      <path d="M0,-120 Q0,0 -40,113" stroke="#6366f1" stroke-width="2"/>
      <path d="M0,-120 Q0,0 -112,42" stroke="#4f46e5" stroke-width="2.6"/>
      <path d="M0,-120 Q0,0 -104,-60" stroke="#818cf8" stroke-width="1.6"/>
    </g>
    <!-- partner dots -->
    <circle cx="110" cy="-48" r="8" fill="#fff" stroke="#76AAD7" stroke-width="2.5"/>
    <circle cx="118" cy="30" r="10" fill="#fff" stroke="#F78208" stroke-width="2.5"/>
    <circle cx="60" cy="104" r="11" fill="#fff" stroke="#76AAD7" stroke-width="2.5"/>
    <circle cx="-40" cy="113" r="7" fill="#fff" stroke="#F12C2C" stroke-width="2.5"/>
    <circle cx="-112" cy="42" r="9" fill="#fff" stroke="#F78208" stroke-width="2.5"/>
    <circle cx="-104" cy="-60" r="7" fill="#fff" stroke="#999999" stroke-width="2.5"/>
    <!-- focal -->
    <circle r="46" fill="#A40194" opacity="0.10"/>
    <circle cx="0" cy="-120" r="6" fill="#A40194" stroke="#fff" stroke-width="2"/>
    <text y="-2" text-anchor="middle" font-size="17" font-weight="800" fill="#0f172a">RyhB</text>
    <text y="15" text-anchor="middle" font-size="10" fill="#94a3b8">sRNA · 1,332 interactions</text>
  </g>
  <text x="320" y="462" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Genome / Linear · click a partner to refocus</text>

  <!-- ===== partners sidebar ===== -->
  <rect x="620" y="146" width="300" height="326" rx="14" fill="#ffffff" stroke="#eef2f7" stroke-width="1.5"/>
  <rect x="620" y="146" width="300" height="74" rx="14" fill="#A40194" opacity="0.06"/>
  <circle cx="642" cy="178" r="6" fill="#fff" stroke="#A40194" stroke-width="3"/>
  <text x="658" y="183" font-size="15" font-weight="700" fill="#0f172a">RyhB</text>
  <text x="636" y="204" font-size="10" fill="#64748b">sRNA · 3,790,000–3,790,090 · −</text>
  <rect x="636" y="226" width="128" height="36" rx="8" fill="#ffffff" stroke="#eef2f7"/>
  <text x="648" y="244" font-size="13" font-weight="700" fill="#0f172a">1,332</text>
  <text x="648" y="256" font-size="8.5" fill="#94a3b8" letter-spacing="0.5">INTERACTIONS</text>
  <rect x="776" y="226" width="128" height="36" rx="8" fill="#ffffff" stroke="#eef2f7"/>
  <text x="788" y="244" font-size="13" font-weight="700" fill="#0f172a">16</text>
  <text x="788" y="256" font-size="8.5" fill="#94a3b8" letter-spacing="0.5">PARTNERS SHOWN</text>
  <!-- list rows -->
  <g font-size="11.5">
    <g>
      <circle cx="644" cy="288" r="4.5" fill="#fff" stroke="#76AAD7" stroke-width="2.5"/>
      <text x="658" y="292" fill="#334155" font-style="italic">sodB</text>
      <text x="892" y="292" text-anchor="end" font-weight="700" fill="#334155">412</text>
    </g>
    <g>
      <circle cx="644" cy="316" r="4.5" fill="#fff" stroke="#76AAD7" stroke-width="2.5"/>
      <text x="658" y="320" fill="#334155" font-style="italic">sdhC</text>
      <text x="892" y="320" text-anchor="end" font-weight="700" fill="#334155">241</text>
    </g>
    <g>
      <circle cx="644" cy="344" r="4.5" fill="#fff" stroke="#F78208" stroke-width="2.5"/>
      <text x="658" y="348" fill="#334155" font-style="italic">fumA</text>
      <text x="892" y="348" text-anchor="end" font-weight="700" fill="#334155">188</text>
    </g>
    <g>
      <circle cx="644" cy="372" r="4.5" fill="#fff" stroke="#F12C2C" stroke-width="2.5"/>
      <text x="658" y="376" fill="#334155">RyhB-sponge</text>
      <text x="892" y="376" text-anchor="end" font-weight="700" fill="#334155">96</text>
    </g>
  </g>
  <line x1="620" y1="430" x2="920" y2="430" stroke="#eef2f7"/>
  <rect x="636" y="442" width="210" height="22" rx="7" fill="#0f172a"/>
  <text x="741" y="457" font-size="10.5" font-weight="600" fill="#fff" text-anchor="middle">✦ AI hypothesis</text>
  <rect x="858" y="442" width="46" height="22" rx="7" fill="#fff" stroke="#cbd5e1"/>
  <text x="881" y="457" font-size="10.5" fill="#475569" text-anchor="middle">CSV</text>

  <!-- ===== callout badges ===== -->
  <g font-weight="700" font-size="13" text-anchor="middle">
    <circle cx="335" cy="30" r="13" fill="#2563eb"/><text x="335" y="35" fill="#fff">1</text>
    <circle cx="800" cy="22" r="13" fill="#2563eb"/><text x="800" y="27" fill="#fff">2</text>
    <line x1="800" y1="35" x2="780" y2="48" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="30" cy="98" r="13" fill="#2563eb"/><text x="30" y="103" fill="#fff">3</text>
    <circle cx="56" cy="166" r="13" fill="#2563eb"/><text x="56" y="171" fill="#fff">4</text>
    <circle cx="904" cy="166" r="13" fill="#2563eb"/><text x="904" y="171" fill="#fff">5</text>
  </g>

  <!-- ===== legend ===== -->
  <g font-size="12.5">
    <g transform="translate(40,520)">
      <circle cx="10" cy="0" r="11" fill="#2563eb"/><text x="10" y="4" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">1</text>
      <text x="28" y="4" fill="#334155"><tspan font-weight="700">Search</tspan> — set the focal RNA (⌘K)</text>
    </g>
    <g transform="translate(40,548)">
      <circle cx="10" cy="0" r="11" fill="#2563eb"/><text x="10" y="4" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">2</text>
      <text x="28" y="4" fill="#334155"><tspan font-weight="700">Filters &amp; dataset</tspan> — shared filters, species / demo / upload</text>
    </g>
    <g transform="translate(40,576)">
      <circle cx="10" cy="0" r="11" fill="#2563eb"/><text x="10" y="4" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">3</text>
      <text x="28" y="4" fill="#334155"><tspan font-weight="700">Lens tabs</tspan> — Interactome · Pair · Structure · Compare</text>
    </g>
    <g transform="translate(540,534)">
      <circle cx="10" cy="0" r="11" fill="#2563eb"/><text x="10" y="4" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">4</text>
      <text x="28" y="4" fill="#334155"><tspan font-weight="700">Active lens</tspan> — the current view (Export PNG)</text>
    </g>
    <g transform="translate(540,562)">
      <circle cx="10" cy="0" r="11" fill="#2563eb"/><text x="10" y="4" font-weight="700" font-size="12" fill="#fff" text-anchor="middle">5</text>
      <text x="28" y="4" fill="#334155"><tspan font-weight="700">Partners panel</tspan> — sort · pin · pair · export · AI</text>
    </g>
  </g>
</svg>
